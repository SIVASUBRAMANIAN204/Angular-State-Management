name: Deploy to AWS

on:
  push:
    branches: [ main ]

env:
  S3_BUCKET: state-management-ngrx
  CLOUDFRONT_ID: E3ENQ34UBKH1H0
  AWS_REGION: us-east-1

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build Angular app
        run: npm run build -- --configuration production
      
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Deploy to S3
        run: aws s3 sync ./dist/ s3://${{ env.S3_BUCKET }} --delete
      
      - name: Clear CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id ${{ env.CLOUDFRONT_ID }} --paths "/*"
      
      - name: Done
        run: echo "✅ Deployed to https://${{ env.CLOUDFRONT_ID }}.cloudfront.net"
